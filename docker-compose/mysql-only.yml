# 仅启动 MySQL 5.7，映射本机 3306（与安装向导默认 127.0.0.1:3306 一致）
# 用法（需已安装 Docker Desktop 并启动）：
#   cd docker-compose
#   docker compose -f mysql-only.yml up -d
# 连接：主机 127.0.0.1 端口 3306 用户 root 密码 123456
# 停止：docker compose -f mysql-only.yml down

version: "3.3"

services:
  mysql:
    image: mysql:5.7
    container_name: crmeb_mysql_local
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
      - --max_allowed_packet=128M
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    volumes:
      - crmeb_mysql_only_data:/var/lib/mysql

volumes:
  crmeb_mysql_only_data:
